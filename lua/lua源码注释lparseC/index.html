r><span class="line"><span class="meta">#<span class="meta-keyword">define</span> LUA_CORE</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lua.h"</span></span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lcode.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"ldebug.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"ldo.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lfunc.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"llex.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lmem.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lobject.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lopcodes.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lparser.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lstate.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"lstring.h"</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span> <span class="meta-string">"ltable.h"</span></span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/* 也只有函数调用或变参操作符这两种TOKEN能返回 ... */</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> hasmultret(k)		((k) == VCALL || (k) == VVARARG)</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/* i:当前活跃的locvar的索引 */</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> getlocvar(fs, i)	((fs)-&gt;f-&gt;locvars[(fs)-&gt;actvar[i]])</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/* 检查value是否超过了limit限制,超过则报错msg */</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> luaY_checklimit(fs,v,l,m)	<span class="meta-keyword">if</span> ((v)&gt;(l)) errorlimit(fs,l,m)</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** nodes for block list (list of active blocks)</span></span><br><span class="line"><span class="comment">** previous:往前跳(eg:查找变量时从now-block往前一级一级的block找)</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="keyword">typedef</span> <span class="class"><span class="keyword">struct</span> <span class="title">BlockCnt</span> &#123;</span></span><br><span class="line">  <span class="class"><span class="keyword">struct</span> <span class="title">BlockCnt</span> *<span class="title">previous</span>;</span>  <span class="comment">/* chain */</span></span><br><span class="line">  <span class="keyword">int</span> breaklist;  <span class="comment">/* list of jumps out of this loop */</span></span><br><span class="line"></span><br><span class="line">  <span class="comment">/* </span></span><br><span class="line"><span class="comment">  ** ！！！！在进入本block的瞬间，外面已经激活的var的数量， ！！！！</span></span><br><span class="line"><span class="comment">  ** 意味着本块内激活的locvar的reg.idx不会低于整个值，</span></span><br><span class="line"><span class="comment">  ** 用于按照便变量的生存期检索变量 </span></span><br><span class="line"><span class="comment">  ** 退出本block后，将fs-&gt;reg重置到本次即可清掉本block内激活的actvar</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line">  lu_byte nactvar;  <span class="comment">/* # active locals outside the breakable structure */</span></span><br><span class="line">  </span><br><span class="line">  lu_byte upval;  <span class="comment">/* true if some variable in the block is an upvalue(本块中存在某些变量是其它块的upvalues：本块关闭时要做善后处理？) */</span></span><br><span class="line">  lu_byte isbreakable;  <span class="comment">/* true if `block' is a loop, 语法规则：break仅能用于loop的block中 */</span></span><br><span class="line">&#125; BlockCnt;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** prototypes for recursive non-terminal functions</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">chunk</span> <span class="params">(LexState *ls)</span></span>;</span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">expr</span> <span class="params">(LexState *ls, expdesc *v)</span></span>;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* anchor:锚 */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">anchor_token</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (ls-&gt;t.token == TK_NAME || ls-&gt;t.token == TK_STRING) &#123;</span><br><span class="line">    TString *ts = ls-&gt;t.seminfo.ts;</span><br><span class="line">    luaX_newstring(ls, getstr(ts), ts-&gt;tsv.len);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">error_expected</span> <span class="params">(LexState *ls, <span class="keyword">int</span> token)</span> </span>&#123;</span><br><span class="line">  luaX_syntaxerror(ls,</span><br><span class="line">      luaO_pushfstring(ls-&gt;L, LUA_QS <span class="string">" expected"</span>, luaX_token2str(ls, token)));</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">errorlimit</span> <span class="params">(FuncState *fs, <span class="keyword">int</span> limit, <span class="keyword">const</span> <span class="keyword">char</span> *what)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> <span class="keyword">char</span> *msg = (fs-&gt;f-&gt;linedefined == <span class="number">0</span>) ?</span><br><span class="line">    luaO_pushfstring(fs-&gt;L, <span class="string">"main function has more than %d %s"</span>, limit, what) :</span><br><span class="line">    luaO_pushfstring(fs-&gt;L, <span class="string">"function at line %d has more than %d %s"</span>,</span><br><span class="line">                            fs-&gt;f-&gt;linedefined, limit, what);</span><br><span class="line">  luaX_lexerror(fs-&gt;ls, msg, <span class="number">0</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">testnext</span> <span class="params">(LexState *ls, <span class="keyword">int</span> c)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (ls-&gt;t.token == c) &#123;</span><br><span class="line">    luaX_next(ls);</span><br><span class="line">    <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">else</span> <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 检查当前c是否为特定的token'Type */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">check</span> <span class="params">(LexState *ls, <span class="keyword">int</span> c)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (ls-&gt;t.token != c)</span><br><span class="line">    error_expected(ls, c);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">checknext</span> <span class="params">(LexState *ls, <span class="keyword">int</span> c)</span> </span>&#123;</span><br><span class="line">  check(ls, c);</span><br><span class="line">  luaX_next(ls);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> check_condition(ls,c,msg)	&#123; <span class="meta-keyword">if</span> (!(c)) luaX_syntaxerror(ls, msg); &#125;</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/* 在where(line)这里，who(TK.1)需要一个what(TK.2)匹配</span></span><br><span class="line"><span class="comment">** eg: function 需要一个end来结束函数定义</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">check_match</span> <span class="params">(LexState *ls, <span class="keyword">int</span> what, <span class="keyword">int</span> who, <span class="keyword">int</span> where)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (!testnext(ls, what)) &#123;</span><br><span class="line">    <span class="keyword">if</span> (where == ls-&gt;linenumber)	<span class="comment">/* 当前行，那就不需要打印line信息了？ */</span></span><br><span class="line">      error_expected(ls, what);</span><br><span class="line">    <span class="keyword">else</span> &#123;</span><br><span class="line">		<span class="comment">/* 输出连带line信息的错误信息 */</span></span><br><span class="line">      luaX_syntaxerror(ls, luaO_pushfstring(ls-&gt;L,</span><br><span class="line">             LUA_QS <span class="string">" expected (to close "</span> LUA_QS <span class="string">" at line %d)"</span>,</span><br><span class="line">              luaX_token2str(ls, what), luaX_token2str(ls, who), where));</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* </span></span><br><span class="line"><span class="comment">** 强制检查并当前token的type为TK_NAME，返回当前token，</span></span><br><span class="line"><span class="comment">** 读取下一个token </span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> TString *<span class="title">str_checkname</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  TString *ts;</span><br><span class="line">  check(ls, TK_NAME);		<span class="comment">/* 当前token'type必须是TK_NAME的类型 */</span></span><br><span class="line">  ts = ls-&gt;t.seminfo.ts;	<span class="comment">/* 提取token的值 */</span></span><br><span class="line">  luaX_next(ls);			<span class="comment">/* 继续读下一个token */</span></span><br><span class="line">  <span class="keyword">return</span> ts;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/*  KEYCODE: 关键函数 */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">init_exp</span> <span class="params">(expdesc *e, expkind k, <span class="keyword">int</span> i)</span> </span>&#123;</span><br><span class="line">  e-&gt;f = e-&gt;t = NO_JUMP;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/*</span></span><br><span class="line"><span class="comment">  ************************************exp对应的reg已定或是一个参数无需reg*********************************</span></span><br><span class="line"><span class="comment">  ** VVOID, VKNUM, VNIL, VTRUE, VFALSE,   	i:0 值直接被包含在表达式expdesc中，无需寄存器</span></span><br><span class="line"><span class="comment">  ** VK   								    i:常量表中的索引</span></span><br><span class="line"><span class="comment">  ** VLOCAL									i:locvar占用的reg索引</span></span><br><span class="line"><span class="comment">  ** VGLOBAL							    i:NO_REG-&gt;全局变量名的NAME在常量表中的索引</span></span><br><span class="line"><span class="comment">  **</span></span><br><span class="line"><span class="comment">  **</span></span><br><span class="line"><span class="comment">  ***********************************需回填指令的RA?**********************************</span></span><br><span class="line"><span class="comment">  ** VRELOCABLE								i:？对应指令OP在指令数组中的下标（方便回填指令中的RA？)？</span></span><br><span class="line"><span class="comment">  ** VCALL, VVARARG							i:对应指令OP在指令数组中的下标（方便回填指令中的RA？)</span></span><br><span class="line"><span class="comment">  **</span></span><br><span class="line"><span class="comment">  ** VNONRELOC								i:对应指令OP在指令数组的下标(方便回填指令中的RA?)</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line">  e-&gt;k = k;</span><br><span class="line">  e-&gt;u.s.info = i;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 用字符串(TK_NAME)s初始化expdesc的e表达式 */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">codestring</span> <span class="params">(LexState *ls, expdesc *e, TString *s)</span> </span>&#123;</span><br><span class="line">  init_exp(e, VK, luaK_stringK(ls-&gt;fs, s));</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 先检查当前t的类型为NAME，后将其携带的string赋值给expdesc, 内部读取一次luaX_next() */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">checkname</span><span class="params">(LexState *ls, expdesc *e)</span> </span>&#123;</span><br><span class="line">  codestring(ls, e, str_checkname(ls));</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* </span></span><br><span class="line"><span class="comment">** 填充一个全新的 Locvar信息到 Proto.locvars (供调试用)</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">registerlocalvar</span> <span class="params">(LexState *ls, TString *varname)</span> </span>&#123;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  Proto *f = fs-&gt;f;</span><br><span class="line">  <span class="keyword">int</span> oldsize = f-&gt;sizelocvars;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 原来的总数组f-&gt;sizelocvars空间不足则扩大 */</span></span><br><span class="line">  luaM_growvector(ls-&gt;L, f-&gt;locvars, fs-&gt;nlocvars, f-&gt;sizelocvars,</span><br><span class="line">                  LocVar, SHRT_MAX, <span class="string">"too many local variables"</span>);</span><br><span class="line">  </span><br><span class="line">  <span class="keyword">while</span> (oldsize &lt; f-&gt;sizelocvars)	<span class="comment">/* locvars数组扩大则将新增的slot填NULL */</span></span><br><span class="line">  	f-&gt;locvars[oldsize++].varname = <span class="literal">NULL</span>;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* 更新locvar信息, startPC,endPC暂时还不确定 */</span></span><br><span class="line">  f-&gt;locvars[fs-&gt;nlocvars].varname = varname; </span><br><span class="line">  <span class="comment">/* printf("registerlocalvar: idx(%d), name(%p)\n", fs-&gt;nlocvars, varname); */</span></span><br><span class="line">  luaC_objbarrier(ls-&gt;L, f, varname);</span><br><span class="line">  <span class="keyword">return</span> fs-&gt;nlocvars++;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 如果v是不变的string则此宏定义可以利用宏处理阶段提高程序速度 */</span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> new_localvarliteral(ls,v,n) \</span></span><br><span class="line">  new_localvar(ls, luaX_newstring(ls, <span class="string">""</span> v, (<span class="keyword">sizeof</span>(v)/<span class="keyword">sizeof</span>(<span class="keyword">char</span>))<span class="number">-1</span>), n)</span><br><span class="line"></span><br><span class="line"><span class="comment">/* KEYCODE</span></span><br><span class="line"><span class="comment">** 注册一个本地变量信息到 Proto.locvars ,</span></span><br><span class="line"><span class="comment">** 填充变量名, startpc,endpc稍后再处理</span></span><br><span class="line"><span class="comment">**</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">new_localvar</span> <span class="params">(LexState *ls, TString *name, <span class="keyword">int</span> n)</span> </span>&#123;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  luaY_checklimit(fs, fs-&gt;nactvar+n+<span class="number">1</span>, LUAI_MAXVARS, <span class="string">"local variables"</span>);</span><br><span class="line">  <span class="comment">/* 设置actvar 到 Proto.nlocvars 的映射 */</span></span><br><span class="line">  <span class="comment">/* 这里仅设置了变量的name, 尚未设置startpc,endpc */</span></span><br><span class="line">  fs-&gt;actvar[fs-&gt;nactvar+n] = cast(<span class="keyword">unsigned</span> short, registerlocalvar(ls, name));</span><br><span class="line">  <span class="comment">//printf("......... %d-&gt;%d", fs-&gt;nactvar+n, fs-&gt;actvar[fs-&gt;nactvar+n]);</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* </span></span><br><span class="line"><span class="comment">** 更新!!! FunState.nactvar 数量，更新 Proto.locvars.startpc </span></span><br><span class="line"><span class="comment">** 一次性生成多个locvar时，nvars可以告诉本函数方便一次性调整到位</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">adjustlocalvars</span> <span class="params">(LexState *ls, <span class="keyword">int</span> nvars)</span> </span>&#123;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* 更新fs中当前激活的locvar数量 */</span></span><br><span class="line">  <span class="comment">/* 更新fs中当前激活的locvar数量 */</span></span><br><span class="line">  <span class="comment">/* 更新fs中当前激活的locvar数量 */</span></span><br><span class="line">  fs-&gt;nactvar = cast_byte(fs-&gt;nactvar + nvars);	</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 更新localvar的startpc */</span></span><br><span class="line">  <span class="keyword">for</span> (; nvars; nvars--) &#123;</span><br><span class="line">    getlocvar(fs, fs-&gt;nactvar - nvars).startpc = fs-&gt;pc;</span><br><span class="line">	<span class="comment">/* 对应的chunk结束时，再更新endpc信息，也只有那个时候才能确切的知道endpc */</span></span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 确定一批actvar的endpc </span></span><br><span class="line"><span class="comment">** 仔细看这个函数，很有意思哈（结合 new_localvar adjustlocalvars 一起看 ）</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">removevars</span> <span class="params">(LexState *ls, <span class="keyword">int</span> tolevel)</span> </span>&#123;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  <span class="keyword">while</span> (fs-&gt;nactvar &gt; tolevel)	<span class="comment">/* 这里tolevel是指block结束时对应的pc.idx */</span></span><br><span class="line">    getlocvar(fs, --fs-&gt;nactvar).endpc = fs-&gt;pc;	<span class="comment">/* 离开block时,关闭block内actvar */</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 查找一个upvalue,返回其在upval数组中的索引，没有则构建 */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">indexupvalue</span> <span class="params">(FuncState *fs, TString *name, expdesc *v)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">int</span> i;</span><br><span class="line">  Proto *f = fs-&gt;f;</span><br><span class="line">  <span class="keyword">int</span> oldsize = f-&gt;sizeupvalues;</span><br><span class="line">  <span class="comment">/* 当前存在的upvalue中已存在吗? */</span></span><br><span class="line">  <span class="keyword">for</span> (i=<span class="number">0</span>; i&lt;f-&gt;nups; i++) &#123;</span><br><span class="line">    <span class="keyword">if</span> (fs-&gt;upvalues[i].k == v-&gt;k &amp;&amp;			<span class="comment">/* 类型为VUPVAL */</span></span><br><span class="line">		fs-&gt;upvalues[i].info == v-&gt;u.s.info) &#123;	<span class="comment">/* 在proto中的索引一致 */</span></span><br><span class="line">      lua_assert(f-&gt;upvalues[i] == name);		<span class="comment">/* 名字就必须一致了 */</span></span><br><span class="line">      <span class="keyword">return</span> i;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* new one */</span></span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* 数组容量不够则扩大 */</span></span><br><span class="line">  luaY_checklimit(fs, f-&gt;nups + <span class="number">1</span>, LUAI_MAXUPVALUES, <span class="string">"upvalues"</span>);</span><br><span class="line">  luaM_growvector(fs-&gt;L, f-&gt;upvalues, f-&gt;nups, f-&gt;sizeupvalues,</span><br><span class="line">                  TString *, MAX_INT, <span class="string">""</span>);</span><br><span class="line">  <span class="keyword">while</span> (oldsize &lt; f-&gt;sizeupvalues)</span><br><span class="line">  	f-&gt;upvalues[oldsize++] = <span class="literal">NULL</span>;</span><br><span class="line">  </span><br><span class="line">  f-&gt;upvalues[f-&gt;nups] = name;</span><br><span class="line">  luaC_objbarrier(fs-&gt;L, f, name);</span><br><span class="line">  lua_assert(v-&gt;k == VLOCAL || v-&gt;k == VUPVAL);	<span class="comment">/* 这里的v-&gt;k==VLOCAL ? */</span></span><br><span class="line">  <span class="comment">/* 更新到fs */</span></span><br><span class="line">  fs-&gt;upvalues[f-&gt;nups].k = cast_byte(v-&gt;k);</span><br><span class="line">  fs-&gt;upvalues[f-&gt;nups].info = cast_byte(v-&gt;u.s.info);</span><br><span class="line">  <span class="keyword">return</span> f-&gt;nups++;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 尝试在当前fs中匹配激活状态的locvar */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">searchvar</span> <span class="params">(FuncState *fs, TString *n)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">int</span> i;</span><br><span class="line">  <span class="keyword">for</span> (i=fs-&gt;nactvar<span class="number">-1</span>; i &gt;= <span class="number">0</span>; i--) &#123;</span><br><span class="line">    <span class="keyword">if</span> (n == getlocvar(fs, i).varname)</span><br><span class="line">      <span class="keyword">return</span> i;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">return</span> <span class="number">-1</span>;  <span class="comment">/* not found */</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* fs中的locvar在其它函数中被当作upval引用</span></span><br><span class="line"><span class="comment">** 标记fs中对应的block，你有变量是其它fs的upval</span></span><br><span class="line"><span class="comment">** level:actvar在reg数组中的索引</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">markupval</span> <span class="params">(FuncState *fs, <span class="keyword">int</span> level)</span> </span>&#123;</span><br><span class="line">  BlockCnt *bl = fs-&gt;bl;</span><br><span class="line">  <span class="comment">/* 这个标记过程的逻辑蛮有意思的 */</span></span><br><span class="line">  <span class="keyword">while</span> (bl &amp;&amp; bl-&gt;nactvar &gt; level)</span><br><span class="line">  	bl = bl-&gt;previous;</span><br><span class="line">  <span class="keyword">if</span> (bl)</span><br><span class="line">  	bl-&gt;upval = <span class="number">1</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 查找变量名对应的表达式类型的值类型(VLOCAL还是?)</span></span><br><span class="line"><span class="comment">**</span></span><br><span class="line"><span class="comment">** 仔细看这个函数的逻辑，搞明白关于变量的查找过程</span></span><br><span class="line"><span class="comment">** step1:先在本地fs6激活中的locvar查找，找到则返回VLOCAL</span></span><br><span class="line"><span class="comment">** step2:往前一个fs5中的激活中的locvar查找，找不到，继续下一步step3</span></span><br><span class="line"><span class="comment">** step3:继续往前一个fs1中的激活的locvar查找，一直到fs1-&gt;pre为空，则</span></span><br><span class="line"><span class="comment">**     可以确定var是一个VGLOBAL</span></span><br><span class="line"><span class="comment">** step4:在某一个fs3中的激活中的locvar被找到，则标记此fs3中的bl表示你的某个var被其它fsX当作upval了</span></span><br><span class="line"><span class="comment">**        往前退，在fs4中的upval中新增一条信息(此upval在父fs3中是VLOCAL,且在fs3的actvar中的索引是多少)</span></span><br><span class="line"><span class="comment">**        再往前退，在fs5中的upval中新增一条信息(此upval在父fs4中是UPVAL，且在fs4的upvalues的索引是多少)</span></span><br><span class="line"><span class="comment">**        再往前退，直到初始的fs6，在fs6中的upval中新增一条信息（此upval在父fs5中是UPVAL,且在fs5的upvalues的索引是多少)</span></span><br><span class="line"><span class="comment">**</span></span><br><span class="line"><span class="comment">** 理论上可以优化下：在本地locvar找不到时，先不要在父fs中找，而是在本fs的upvales中找下</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">singlevaraux</span> <span class="params">(FuncState *fs, TString *n, expdesc *var, <span class="keyword">int</span> base)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (fs == <span class="literal">NULL</span>) &#123;  <span class="comment">/* no more levels? */</span></span><br><span class="line">  	<span class="comment">/* default is global variable, NO_REG:表示此全局变量尚未决定其寄存器的位置</span></span><br><span class="line"><span class="comment">	** 全局变量对应的NAME在p中常量表的索引由singlevar()函数来处理</span></span><br><span class="line"><span class="comment">  	*/</span></span><br><span class="line">    init_exp(var, VGLOBAL, NO_REG);  </span><br><span class="line">    <span class="keyword">return</span> VGLOBAL;	<span class="comment">/* 往外一层一层都找不到时，则认为它是全局变量 */</span></span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">else</span> &#123;</span><br><span class="line">  	<span class="comment">/* 在激活的locvar中找到了，则是本地变量 */</span></span><br><span class="line">    <span class="keyword">int</span> v = searchvar(fs, n);  <span class="comment">/* look up at current level */</span></span><br><span class="line">    <span class="keyword">if</span> (v &gt;= <span class="number">0</span>) &#123;</span><br><span class="line">      init_exp(var, VLOCAL, v);</span><br><span class="line">      <span class="keyword">if</span> (!base)</span><br><span class="line">        markupval(fs, v);  <span class="comment">/* local will be used as an upval */</span></span><br><span class="line">      <span class="keyword">return</span> VLOCAL;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">else</span> &#123;  <span class="comment">/* not found at current level; try upper one */</span></span><br><span class="line">      <span class="keyword">if</span> (singlevaraux(fs-&gt;prev, n, var, <span class="number">0</span>) == VGLOBAL)	<span class="comment">/* 都没找到，则是全局变量 */</span></span><br><span class="line">        <span class="keyword">return</span> VGLOBAL;</span><br><span class="line">	  <span class="comment">/* 父func中找到，在自己的fun中算upval */</span></span><br><span class="line">      var-&gt;u.s.info = indexupvalue(fs, n, var);  <span class="comment">/* else was LOCAL or UPVAL */</span></span><br><span class="line">      var-&gt;k = VUPVAL;  <span class="comment">/* upvalue in this level */</span></span><br><span class="line">      <span class="keyword">return</span> VUPVAL;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* </span></span><br><span class="line"><span class="comment">** step1: 检查ls-&gt;t.token的类型为TK_NAME，读取下一个TOKEN</span></span><br><span class="line"><span class="comment">** step2: 根据上一个token的NAME，确定其变量(VLOCAL,VGLOBAL还是VUPVAL？)类型，</span></span><br><span class="line"><span class="comment">**            后填充expdesc.u.s.info信息</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">singlevar</span> <span class="params">(LexState *ls, expdesc *var)</span> </span>&#123;</span><br><span class="line">  TString *varname = str_checkname(ls);</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/*</span></span><br><span class="line"><span class="comment">  ** OP_GETGLOBAL A Bx R(A) := Gbl[Kst(Bx)]</span></span><br><span class="line"><span class="comment">  ** OP_SETGLOBAL A Bx Gbl[Kst(Bx)] := R(A)</span></span><br><span class="line"><span class="comment">  ** 全局变量的指令需要知道表示全局变量的NAME在常量表中的idx，</span></span><br><span class="line"><span class="comment">  **     理解这一点就明白了下面var-&gt;u.s.info的赋值的意义</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line">  <span class="keyword">if</span> (singlevaraux(fs, varname, var, <span class="number">1</span>) == VGLOBAL) &#123;	<span class="comment">/* VLOCVAR,VUPVAL在singlevaraux中已被init_exp初始化 */</span></span><br><span class="line">    var-&gt;u.s.info = luaK_stringK(fs, varname);  <span class="comment">/* info points to global name */</span></span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 针对 nvars = nexps 赋值进行调整</span></span><br><span class="line"><span class="comment">** 如果右边少了则给左边赋NIL</span></span><br><span class="line"><span class="comment">** 如果右边有call,...则确定期待的返回值个数</span></span><br><span class="line"><span class="comment">**</span></span><br><span class="line"><span class="comment">** ！！！ 如果右边多了，本函数未处理！！！</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">adjust_assign</span> <span class="params">(LexState *ls, <span class="keyword">int</span> nvars, <span class="keyword">int</span> nexps, expdesc *e)</span> </span>&#123;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  <span class="comment">/* extra: 右边除掉fun和...外，表达式的数量少于左边的val的数量的情况下，缺失的数量? */</span></span><br><span class="line">  <span class="keyword">int</span> extra = nvars - nexps;	</span><br><span class="line">  <span class="keyword">if</span> (hasmultret(e-&gt;k)) &#123;	<span class="comment">/* exp的类型为VARARG或CALL */</span></span><br><span class="line">    extra++;  <span class="comment">/* includes call itself：除开VARARG和CALL本身 */</span></span><br><span class="line">	<span class="comment">/* 如果右边exp多了，那就不用补偿左边了</span></span><br><span class="line"><span class="comment">	** OP_VARARG A B R(A), R(A+1), ..., R(A+B-1) = vararg</span></span><br><span class="line"><span class="comment">	** 看上面的指令的含义， <span class="line">  init_exp(v, VRELOCABLE, luaK_codeABx(fs, OP_CLOSURE, <span class="number">0</span>, fs-&gt;np<span class="number">-1</span>));</span><br><span class="line">  <span class="keyword">for</span> (i=<span class="number">0</span>; i&lt;func-&gt;f-&gt;nups; i++) &#123;</span><br><span class="line">    OpCode o = (func-&gt;upvalues[i].k == VLOCAL) ? OP_MOVE : OP_GETUPVAL;	<span class="comment">/* TODOLOOK 这里不是明白 */</span></span><br><span class="line">    luaK_codeABC(fs, o, <span class="number">0</span>, func-&gt;upvalues[i].info, <span class="number">0</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 开始编译函数 */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">open_func</span> <span class="params">(LexState *ls, FuncState *fs)</span> </span>&#123;</span><br><span class="line">  lua_State *L = ls-&gt;L;</span><br><span class="line">  </span><br><span class="line">  fs-&gt;L = L;	</span><br><span class="line">  Proto *f = luaF_newproto(L);</span><br><span class="line">  fs-&gt;ls = ls;</span><br><span class="line">  fs-&gt;f = f;	<span class="comment">/* funState 在编译哪个Proto */</span></span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* ls指向最新的一个FuncState,这里可以猜测，只有先编译完了子函数才有可能编译父函数 */</span></span><br><span class="line">  fs-&gt;prev = ls-&gt;fs;  <span class="comment">/* linked list of funcstates */</span></span><br><span class="line">  ls-&gt;fs = fs;</span><br><span class="line">  </span><br><span class="line">  fs-&gt;pc = <span class="number">0</span>;</span><br><span class="line">  fs-&gt;lasttarget = <span class="number">-1</span>;</span><br><span class="line">  fs-&gt;jpc = NO_JUMP;</span><br><span class="line">  fs-&gt;freereg = <span class="number">0</span>;</span><br><span class="line">  fs-&gt;nk = <span class="number">0</span>;</span><br><span class="line">  fs-&gt;np = <span class="number">0</span>;</span><br><span class="line">  fs-&gt;nlocvars = <span class="number">0</span>;</span><br><span class="line">  fs-&gt;nactvar = <span class="number">0</span>;</span><br><span class="line">  fs-&gt;bl = <span class="literal">NULL</span>;	<span class="comment">/* 这里是NULL */</span></span><br><span class="line">  f-&gt;source = ls-&gt;source;</span><br><span class="line">  f-&gt;maxstacksize = <span class="number">2</span>;  <span class="comment">/* registers 0/1 are always valid */</span></span><br><span class="line">  fs-&gt;h = luaH_new(L, <span class="number">0</span>, <span class="number">0</span>);</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* anchor table of constants and prototype (to avoid being collected)</span></span><br><span class="line"><span class="comment">  ** 常量和原型的锚表（避免被收集）</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line">  sethvalue2s(L, L-&gt;top, fs-&gt;h);</span><br><span class="line">  incr_top(L);	<span class="comment">/* 放到堆栈上可避免被gc,如果编译失败stack回缩，则可自动被gc（没有被其它obj引用的话 ） */</span></span><br><span class="line">  setptvalue2s(L, L-&gt;top, f);</span><br><span class="line">  incr_top(L);</span><br><span class="line">  </span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">close_func</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  lua_State *L = ls-&gt;L;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  Proto *f = fs-&gt;f;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 关闭还处于激活状态的actvar(设置endpc) */</span></span><br><span class="line">  removevars(ls, <span class="number">0</span>);</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 自动补一个 OP_RETURN 指令 */</span></span><br><span class="line">  luaK_ret(fs, <span class="number">0</span>, <span class="number">0</span>);  <span class="comment">/* final return */</span></span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 释放多余的mem */</span></span><br><span class="line">  luaM_reallocvector(L, f-&gt;code, f-&gt;sizecode, fs-&gt;pc, Instruction);</span><br><span class="line">  f-&gt;sizecode = fs-&gt;pc;</span><br><span class="line">  </span><br><span class="line">  luaM_reallocvector(L, f-&gt;lineinfo, f-&gt;sizelineinfo, fs-&gt;pc, <span class="keyword">int</span>);</span><br><span class="line">  f-&gt;sizelineinfo = fs-&gt;pc;</span><br><span class="line">  </span><br><span class="line">  luaM_reallocvector(L, f-&gt;k, f-&gt;sizek, fs-&gt;nk, TValue);</span><br><span class="line">  f-&gt;sizek = fs-&gt;nk;</span><br><span class="line">  </span><br><span class="line">  luaM_reallocvector(L, f-&gt;p, f-&gt;sizep, fs-&gt;np, Proto *);</span><br><span class="line">  f-&gt;sizep = fs-&gt;np;</span><br><span class="line">  </span><br><span class="line">  luaM_reallocvector(L, f-&gt;locvars, f-&gt;sizelocvars, fs-&gt;nlocvars, LocVar);</span><br><span class="line">  f-&gt;sizelocvars = fs-&gt;nlocvars;</span><br><span class="line">  </span><br><span class="line">  luaM_reallocvector(L, f-&gt;upvalues, f-&gt;sizeupvalues, f-&gt;nups, TString *);</span><br><span class="line">  f-&gt;sizeupvalues = f-&gt;nups;</span><br><span class="line">  </span><br><span class="line">  lua_assert(luaG_checkcode(f));	<span class="comment">/* 检查生成的字节码是否有明显的问题 */</span></span><br><span class="line">  lua_assert(fs-&gt;bl == <span class="literal">NULL</span>);</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* 本子函数编译完毕，切换到母函数中去 */</span></span><br><span class="line">  ls-&gt;fs = fs-&gt;prev;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* last token read was anchored(锚定) in defunct function; must reanchor(锚) it */</span></span><br><span class="line">  <span class="keyword">if</span> (fs) anchor_token(ls);</span><br><span class="line">  L-&gt;top -= <span class="number">2</span>;  <span class="comment">/* remove table and prototype from the stack */</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function">Proto *<span class="title">luaY_parser</span> <span class="params">(lua_State *L, ZIO *z, Mbuffer *buff, <span class="keyword">const</span> <span class="keyword">char</span> *name)</span> </span>&#123;</span><br><span class="line">  <span class="class"><span class="keyword">struct</span> <span class="title">LexState</span> <span class="title">lexstate</span>;</span></span><br><span class="line">  <span class="class"><span class="keyword">struct</span> <span class="title">FuncState</span> <span class="title">funcstate</span>;</span>	<span class="comment">/* mainFunc */</span></span><br><span class="line">  </span><br><span class="line">  lexstate.buff = buff;</span><br><span class="line">  <span class="comment">/* 设置input信息，但，buff在上面就设置了，有点意思吧，z和buff对于lexState是有点不同的 */</span></span><br><span class="line">  luaX_setinput(L, &amp;lexstate, z, luaS_new(L, name));</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 一个lua文件，编译模块将其当做一个函数来看待</span></span><br><span class="line"><span class="comment">  ** 函数原型 function (...)</span></span><br><span class="line"><span class="comment">  **          end</span></span><br><span class="line"><span class="comment">  **</span></span><br><span class="line"><span class="comment">  ** BNF funcbody ::= `(´ [parlist] `)´ block end</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line">  open_func(&amp;lexstate, &amp;funcstate);</span><br><span class="line">  funcstate.f-&gt;is_vararg = VARARG_ISVARARG;  <span class="comment">/* main func. is always vararg，哈哈知道lua文件一般开头的local modName=...的语法支撑了吧 */</span></span><br><span class="line">  luaX_next(&amp;lexstate);  <span class="comment">/* read first token */</span></span><br><span class="line">  chunk(&amp;lexstate);</span><br><span class="line">  check(&amp;lexstate, TK_EOS);	<span class="comment">/* 直到编译到文件EOF才结束编译流程 */</span></span><br><span class="line">  close_func(&amp;lexstate);</span><br><span class="line">  </span><br><span class="line">  lua_assert(lexstate.fs == <span class="literal">NULL</span>);		<span class="comment">/* lexstate下不应该还有未编译完的funState了 */</span></span><br><span class="line">  lua_assert(funcstate.prev == <span class="literal">NULL</span>);	<span class="comment">/* 已编译完的主函数上面还有其它函数，不可能的嘛 */</span></span><br><span class="line">  lua_assert(funcstate.f-&gt;nups == <span class="number">0</span>);	<span class="comment">/* 编译结束，主函数不应该有nups了 */</span></span><br><span class="line">  <span class="keyword">return</span> funcstate.f;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*============================================================*/</span></span><br><span class="line"><span class="comment">/* GRAMMAR RULES */</span></span><br><span class="line"><span class="comment">/*============================================================*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/* A.B, A:B </span></span><br><span class="line"><span class="comment">** 对前缀生成必要的估值指令，放入free'reg(若有必要)</span></span><br><span class="line"><span class="comment">** 用上述值作为A,再和B一起生成新的VINDEXED表达式</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">field</span> <span class="params">(LexState *ls, expdesc *v)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* field -&gt; ['.' | ':'] NAME */</span></span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  expdesc key;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* </span></span><br><span class="line"><span class="comment">  **将前缀(a.b.c中的a.b)加载到reg中</span></span><br><span class="line"><span class="comment">  **若前缀已在寄存器中则无需处理(A=VLOCAL(a))</span></span><br><span class="line"><span class="comment">  */</span></span><br><span class="line">  luaK_exp2anyreg(fs, v);	</span><br><span class="line">  </span><br><span class="line">  luaX_next(ls); 		<span class="comment">/* skip the dot or colon */</span></span><br><span class="line">  </span><br><span class="line">  checkname(ls, &amp;key);	<span class="comment">/* 读取NAME这个域的常量exp并返回给key */</span>		</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 生成新的VINDEXED表达式（求值指令，指令的目标寄存器尚未处理） */</span></span><br><span class="line">  luaK_indexed(fs, v, &amp;key);	</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">yindex</span> <span class="params">(LexState *ls, expdesc *v)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* index -&gt; '[' expr ']' */</span></span><br><span class="line">  luaX_next(ls);  <span class="comment">/* skip the '[' */</span></span><br><span class="line">  expr(ls, v);</span><br><span class="line">  luaK_exp2val(ls-&gt;fs, v);</span><br><span class="line">  checknext(ls, <span class="string">']'</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** &#123;======================================================================</span></span><br><span class="line"><span class="comment">** Rules for Constructors</span></span><br><span class="line"><span class="comment">** =======================================================================</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/* 构造表   tbl &#123;a, b, c=val, d.e&#125; */</span></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">ConsControl</span> &#123;</span></span><br><span class="line">  expdesc *t;  <span class="comment">/* table descriptor 指代本表的expdesc */</span></span><br><span class="line">  expdesc v;  <span class="comment">/* last list item read: 指代正在分析到的哪一个元素eg(b),对于c=val用不上v */</span></span><br><span class="line">  <span class="keyword">int</span> nh;  <span class="comment">/* total number of `record' elements */</span></span><br><span class="line">  <span class="keyword">int</span> na;  <span class="comment">/* total number of array elements */</span></span><br><span class="line">  <span class="keyword">int</span> tostore;  <span class="comment">/* number of array elements pending to be stored */</span></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 形如 local tbl = &#123; x = y, [a] = b,&#125;</span></span><br><span class="line"><span class="comment">** 中的x=1,这种指定tbl[k]=v的表达式</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">recfield</span> <span class="params">(LexState *ls, struct ConsControl *cc)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* recfield -&gt; (NAME | `['exp1`]') = exp1 */</span></span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  <span class="keyword">int</span> reg = ls-&gt;fs-&gt;freereg;</span><br><span class="line">  expdesc key, val;</span><br><span class="line">  <span class="keyword">int</span> rkkey;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 对key生成加载指令 */</span></span><br><span class="line">  <span class="keyword">if</span> (ls-&gt;t.token == TK_NAME) &#123;</span><br><span class="line">    luaY_checklimit(fs, cc-&gt;nh, MAX_INT, <span class="string">"items in a constructor"</span>);</span><br><span class="line">    checkname(ls, &amp;key);</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">else</span>  <span class="comment">/* ls-&gt;t.token == '[' */</span></span><br><span class="line">    yindex(ls, &amp;key);</span><br><span class="line">  </span><br><span class="line">  cc-&gt;nh++;</span><br><span class="line">  checknext(ls, <span class="string">'='</span>);</span><br><span class="line">  <span class="comment">/* 回填上述k的加载指令,将表达式的值SET到next'free'reg上 */</span></span><br><span class="line">  rkkey = luaK_exp2RK(fs, &amp;key);</span><br><span class="line"></span><br><span class="line">  <span class="comment">/* 初始化表达式val */</span></span><br><span class="line">  expr(ls, &amp;val);</span><br><span class="line">  <span class="comment">/* 先生成对val的LOAD_XXX加载指令，后生成OP_SETTABLE */</span></span><br><span class="line">  luaK_codeABC(fs, OP_SETTABLE, cc-&gt;t-&gt;u.s.info, rkkey, luaK_exp2RK(fs, &amp;val));</span><br><span class="line">  </span><br><span class="line">  fs-&gt;freereg = reg;  <span class="comment">/* free registers 释放表达式占用的临时寄存器 */</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* local tbl = &#123;a,b,c,d&#125;</span></span><br><span class="line"><span class="comment">** 解析完毕b,关闭对b的解析</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">closelistfield</span> <span class="params">(FuncState *fs, struct ConsControl *cc)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (cc-&gt;v.k == VVOID) <span class="keyword">return</span>;  <span class="comment">/* there is no list item */</span></span><br><span class="line">  luaK_exp2nextreg(fs, &amp;cc-&gt;v);</span><br><span class="line">  cc-&gt;v.k = VVOID;	<span class="comment">/* 释放表达式 */</span></span><br><span class="line">  <span class="keyword">if</span> (cc-&gt;tostore == LFIELDS_PER_FLUSH) &#123;</span><br><span class="line">    luaK_setlist(fs, cc-&gt;t-&gt;u.s.info, cc-&gt;na, cc-&gt;tostore);  <span class="comment">/* flush */</span></span><br><span class="line">    cc-&gt;tostore = <span class="number">0</span>;  <span class="comment">/* no more items pending */</span></span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* local tbl = &#123;a, b, c, d&#125;</span></span><br><span class="line"><span class="comment">** 结束d的解析后，调到这里 </span></span><br><span class="line"><span class="comment">** 逻辑独立出来是因为函数调用作为表的最后一个元素和非最后一个元素，其期望对其返回值的个数是不一样的</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">lastlistfield</span> <span class="params">(FuncState *fs, struct ConsControl *cc)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">if</span> (cc-&gt;tostore == <span class="number">0</span>) <span class="keyword">return</span>;</span><br><span class="line">  <span class="keyword">if</span> (hasmultret(cc-&gt;v.k)) &#123;</span><br><span class="line">    luaK_setmultret(fs, &amp;cc-&gt;v);</span><br><span class="line">    luaK_setlist(fs, cc-&gt;t-&gt;u.s.info, cc-&gt;na, LUA_MULTRET);</span><br><span class="line">    cc-&gt;na--;  <span class="comment">/* do not count last expression (unknown number of elements) */</span></span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">else</span> &#123;</span><br><span class="line">    <span class="keyword">if</span> (cc-&gt;v.k != VVOID)</span><br><span class="line">      luaK_exp2nextreg(fs, &amp;cc-&gt;v);</span><br><span class="line">    luaK_setlist(fs, cc-&gt;t-&gt;u.s.info, cc-&gt;na, cc-&gt;tostore);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* tbl = &#123;a,b, c = 100&#125; 数组中单个field eg:a</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">listfield</span> <span class="params">(LexState *ls, struct ConsControl *cc)</span> </span>&#123;</span><br><span class="line">  expr(ls, &amp;cc-&gt;v);</span><br><span class="line">  luaY_checklimit(ls-&gt;fs, cc-&gt;na, MAX_INT, <span class="string">"items in a constructor"</span>);</span><br><span class="line">  cc-&gt;na++;</span><br><span class="line">  cc-&gt;tostore++;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">constructor</span> <span class="params">(LexState *ls, expdesc *t)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* constructor -&gt; ?? */</span></span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  <span class="keyword">int</span> <span class="built_in">line</span> = ls-&gt;linenumber;</span><br><span class="line">  </span><br><span class="line">  <span class="keyword">int</span> pc = luaK_codeABC(fs, OP_NEWTABLE, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>);</span><br><span class="line">  <span class="class"><span class="keyword">struct</span> <span class="title">ConsControl</span> <span class="title">cc</span>;</span></span><br><span class="line">  cc.na = cc.nh = cc.tostore = <span class="number">0</span>;</span><br><span class="line">  cc.t = t;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* 初始化table的exp */</span></span><br><span class="line">  init_exp(t, VRELOCABLE, pc);</span><br><span class="line">  </span><br><span class="line">  init_exp(&amp;cc.v, VVOID, <span class="number">0</span>);  <span class="comment">/* no value (yet) */</span></span><br><span class="line">  </span><br><span class="line">  luaK_exp2nextreg(ls-&gt;fs, t);  <span class="comment">/* fix it at stack top (for gc) */</span></span><br><span class="line">  checknext(ls, <span class="string">'&#123;'</span>);</span><br><span class="line">  <span class="keyword">do</span> &#123;</span><br><span class="line">    lua_assert(cc.v.k == VVOID || cc.tostore &gt; <span class="number">0</span>);</span><br><span class="line">    <span class="keyword">if</span> (ls-&gt;t.token == <span class="string">'&#125;'</span>) <span class="keyword">break</span>;	<span class="comment">/* 表被遍历完毕 */</span></span><br><span class="line">    closelistfield(fs, &amp;cc);</span><br><span class="line">    <span class="keyword">switch</span>(ls-&gt;t.token) &#123;</span><br><span class="line">      <span class="keyword">case</span> TK_NAME: &#123;  <span class="comment">/* may be listfields or recfields */</span></span><br><span class="line">        luaX_lookahead(ls);</span><br><span class="line">        <span class="keyword">if</span> (ls-&gt;lookahead.token != <span class="string">'='</span> nopr</span> <span class="params">(<span class="keyword">int</span> op)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">switch</span> (op) &#123;</span><br><span class="line">    <span class="keyword">case</span> TK_NOT: <span class="keyword">return</span> OPR_NOT;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'-'</span>: <span class="keyword">return</span> OPR_MINUS;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'#'</span>: <span class="keyword">return</span> OPR_LEN;</span><br><span class="line">    <span class="keyword">default</span>: <span class="keyword">return</span> OPR_NOUNOPR;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> BinOpr <span class="title">getbinopr</span> <span class="params">(<span class="keyword">int</span> op)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">switch</span> (op) &#123;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'+'</span>: <span class="keyword">return</span> OPR_ADD;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'-'</span>: <span class="keyword">return</span> OPR_SUB;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'*'</span>: <span class="keyword">return</span> OPR_MUL;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'/'</span>: <span class="keyword">return</span> OPR_DIV;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'%'</span>: <span class="keyword">return</span> OPR_MOD;</span><br><span class="line">    <span class="keyword">case</span> <span class="string">'^'</span>: <span class="keyword">return</span> OPR_POW;</s class="number">6</span>&#125;, &#123;<span class="number">6</span>, <span class="number">6</span>&#125;, &#123;<span class="number">7</span>, <span class="number">7</span>&#125;, &#123;<span class="number">7</span>, <span class="number">7</span>&#125;, &#123;<span class="number">7</span>, <span class="number">7</span>&#125;,  <span class="comment">/* `+' `-' `/' `%' */</span></span><br><span class="line">   &#123;<span class="number">10</span>, <span class="number">9</span>&#125;, &#123;<span class="number">5</span>, <span class="number">4</span>&#125;,                 <span class="comment">/* power and concat (right associative) */</span></span><br><span class="line">   &#123;<span class="number">3</span>, <span class="number">3</span>&#125;, &#123;<span class="number">3</span>, <span class="number">3</span>&#125;,                  <span class="comment">/* equality and inequality */</span></span><br><span class="line">   &#123;<span class="number">3</span>, <span class="number">3</span>&#125;, &#123;<span class="number">3</span>, <span class="number">3</span>&#125;, &#123;<span class="number">3</span>, <span class="number">3</span>&#125;, &#123;<span class="number">3</span>, <span class="number">3</span>&#125;,  <span class="comment">/* order */</span></span><br><span class="line">   &#123;<span class="number">2</span>, <span class="number">2</span>&#125;, &#123;<span class="number">1</span>, <span class="number">1</span>&#125;                   <span class="comment">/* logical (and/or) */</span></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">define</span> UNARY_PRIORITY	8  <span class="comment">/* priority for unary operators,一元操作符的优先级？ */</span></span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** subexpr -&gt; (simpleexp | unop subexpr) &#123; binop subexpr &#125;</span></span><br><span class="line"><span class="comment">** where `binop' is any binary operator with a priority higher than `limit'</span></span><br><span class="line"><span class="comment">** 操作符表达式</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> BinOpr <span class="title">subexpr</span> <span class="params">(LexState *ls, expdesc *v, <span class="keyword">unsigned</span> <span class="keyword">int</span> limit)</span> </span>&#123;</span><br><span class="line">  BinOpr op;</span><br><span class="line">  UnOpr uop;</span><br><span class="line">  enterlevel(ls);</span><br><span class="line">  uop = getunopr(ls-&gt;t.token);</span><br><span class="line">  <span class="keyword">if</span> (uop != OPR_NOUNOPR) &#123;</span><br><span class="line">    luaX_next(ls);</span><br><span class="line">    subexpr(ls, v, UNARY_PRIORITY);</span><br><span class="line">    luaK_prefix(ls-&gt;fs, uop, v);</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">else</span> simpleexp(ls, v);</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* expand while operators have priorities higher than `limit' */</span></span><br><span class="line">  op = getbinopr(ls-&gt;t.token);</span><br><span class="line">  <span class="keyword">while</span> (op != OPR_NOBINOPR &amp;&amp; priority[op].left &gt; limit) &#123;</span><br><span class="line">    expdesc v2;</span><br><span class="line">    BinOpr nextop;</span><br><span class="line">    luaX_next(ls);</span><br><span class="line">    luaK_infix(ls-&gt;fs, op, v);</span><br><span class="line">    <span class="comment">/* read sub-expression with higher priority */</span></span><br><span class="line">    nextop = subexpr(ls, &amp;v2, priority[op].right);</span><br><span class="line">    luaK_posfix(ls-&gt;fs, op, v, &amp;v2);</span><br><span class="line">    op = nextop;</span><br><span class="line">  &#125;</span><br><span class="line">  leavelevel(ls);</span><br><span class="line">  <span class="keyword">return</span> op;  <span class="comment">/* return first untreated operator */</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">expr</span> <span class="params">(LexState *ls, expdesc *v)</span> </span>&#123;</span><br><span class="line">  subexpr(ls, v, <span class="number">0</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* &#125;==================================================================== */</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** &#123;======================================================================</span></span><br><span class="line"><span class="comment">** Rules for Statements</span></span><br><span class="line"><span class="comment">** =======================================================================</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">/* repeat</span></span><br><span class="line"><span class="comment">**   statements</span></span><br><span class="line"><span class="comment">** until( condition )</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">block_follow</span> <span class="params">(<span class="keyword">int</span> token)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">switch</span> (token) &#123;	<span class="comment">/* END和EOS还没理解 */</span></span><br><span class="line">    <span class="keyword">case</span> TK_ELSE: <span class="keyword">case</span> TK_ELSEIF: <span class="keyword">case</span> TK_END:</span><br><span class="line">    <span class="keyword">case</span> TK_UNTIL: <span class="keyword">case</span> TK_EOS:</span><br><span class="line">      <span class="keyword">return</span> <span class="number">1</span>;</span><br><span class="line">    <span class="keyword">default</span>: <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">block</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* block -&gt; chunk */</span></span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  BlockCnt bl;</span><br><span class="line">  enterblock(fs, &amp;bl, <span class="number">0</span>);</span><br><span class="line">  chunk(ls);</span><br><span class="line">  lua_assert(bl.breaklist == NO_JUMP);</span><br><span class="line">  leaveblock(fs);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** structure to chain all variables in the left-hand side of an</span></span><br><span class="line"><span class="comment">** assignment</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">LHS_assign</span> &#123;</span></span><br><span class="line">  <span class="class"><span class="keyword">struct</span> <span class="title">LHS_assign</span> *<span class="title">prev</span>;</span></span><br><span class="line">  expdesc v;  <span class="comment">/* variable (global, local, upvalue, or indexed) */</span></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">** check whether, in an assignment to a local variable, the local variable</span></span><br><span class="line"><span class="comment">** is needed in a previous assignment (to a table). If so, save original</span></span><br><span class="line"><span class="comment">** local value in a safe place and use this safe copy in the previous</span></span><br><span class="line"><span class="comment">** assignment.</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">check_conflict</span> <span class="params">(LexState *ls, struct LHS_assign *lh, expdesc *v)</span> </span>&#123;</span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  <span class="keyword">int</span> extra = fs-&gt;freereg;  <span class="comment">/* eventual position to save local variable */</span></span><br><span class="line">  <span class="keyword">int</span> conflict = <span class="number">0</span>;</span><br><span class="line">  <span class="keyword">for</span> (; lh; lh = lh-&gt;prev) &#123;</span><br><span class="line">    <span class="keyword">if</span> (lh-&gt;v.k == VINDEXED) &#123;</span><br><span class="line">      <span class="keyword">if</span> (lh-&gt;v.u.s.info == v-&gt;u.s.info) &#123;  <span class="comment">/* conflict? */</span></span><br><span class="line">        conflict = <span class="number">1</span>;</span><br><span class="line">
