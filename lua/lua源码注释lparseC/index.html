>, ls-&gt;linenumber);</span><br><span class="line">  luaK_storevar(fs, &amp;v, &amp;b);</span><br><span class="line">  </span><br><span class="line">  <span class="comment">/* debug information will only see the variable after this point! */</span></span><br><span class="line">  getlocvar(fs, fs-&gt;nactvar - <span class="number">1</span>).startpc = fs-&gt;pc;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">localstat</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* stat -&gt; LOCAL NAME &#123;`,' NAME&#125; [`=' explist1] */</span></span><br><span class="line">  <span class="keyword">int</span> nvars = <span class="number">0</span>;</span><br><span class="line">  <span class="keyword">int</span> nexps;</span><br><span class="line">  expdesc e;</span><br><span class="line">  </span><br><span class="line">  <span class="keyword">do</span> &#123;	<span class="comment">/* 登记左边的变量名到 Proto.locvars */</span></span><br><span class="line">    new_localvar(ls, str_checkname(ls), nvars++);</span><br><span class="line">  &#125; <span class="keyword">while</span> (testnext(ls, <span class="string">','</span>));</span><br><span class="line">  </span><br><span class="line">  <span class="keyword">if</span> (testnext(ls, <span class="string">'='</span>))</span><br><span class="line">    nexps = explist1(ls, &amp;e);	<span class="comment">/* 解析表达式 */</span></span><br><span class="line">  <span class="keyword">else</span> &#123;</span><br><span class="line">    e.k = VVOID;</span><br><span class="line">    nexps = <span class="number">0</span>;</span><br><span class="line">  &#125;</span><br><span class="line">  adjust_assign(ls, nvars, nexps, &amp;e);</span><br><span class="line">  adjustlocalvars(ls, nvars);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">funcname</span> <span class="params">(LexState *ls, expdesc *v)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* funcname -&gt; NAME &#123;field&#125; [`:' NAME] */</span></span><br><span class="line">  <span class="keyword">int</span> needself = <span class="number">0</span>;</span><br><span class="line">  singlevar(ls, v);</span><br><span class="line">  <span class="keyword">while</span> (ls-&gt;t.token == <span class="string">'.'</span>)</span><br><span class="line">    field(ls, v);</span><br><span class="line">  <span class="keyword">if</span> (ls-&gt;t.token == <span class="string">':'</span>) &#123;</span><br><span class="line">    needself = <span class="number">1</span>;	<span class="comment">/* 需要给函数添加一个self参数 eg:           function modName:sub () body end */</span></span><br><span class="line">    field(ls, v);</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">return</span> needself;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">funcstat</span> <span class="params">(LexState *ls, <span class="keyword">int</span> <span class="built_in">line</span>)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* funcstat -&gt; FUNCTION funcname body */</span></span><br><span class="line">  <span class="keyword">int</span> needself;</span><br><span class="line">  expdesc v, b;</span><br><span class="line">  luaX_next(ls);  <span class="comment">/* skip FUNCTION */</span></span><br><span class="line">  needself = funcname(ls, &amp;v);</span><br><span class="line">  body(ls, &amp;b, needself, <span class="built_in">line</span>);</span><br><span class="line">  luaK_storevar(ls-&gt;fs, &amp;v, &amp;b);</span><br><span class="line">  luaK_fixline(ls-&gt;fs, <span class="built_in">line</span>);  <span class="comment">/* definition `happens' in the first line */</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* 处理表达式stat */</span></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">exprstat</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* stat -&gt; func | assignment */</span></span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  <span class="class"><span class="keyword">struct</span> <span class="title">LHS_assign</span> <span class="title">v</span>;</span></span><br><span class="line">  primaryexp(ls, &amp;v.v);</span><br><span class="line">  <span class="keyword">if</span> (v.v.k == VCALL)  <span class="comment">/* stat -&gt; func */</span></span><br><span class="line">    SETARG_C(getcode(fs, &amp;v.v), <span class="number">1</span>);  <span class="comment">/* call statement uses no results */</span></span><br><span class="line">  <span class="keyword">else</span> &#123;  <span class="comment">/* stat -&gt; assignment */</span></span><br><span class="line">    v.prev = <span class="literal">NULL</span>;</span><br><span class="line">    assignment(ls, &amp;v, <span class="number">1</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">retstat</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* stat -&gt; RETURN explist */</span></span><br><span class="line">  FuncState *fs = ls-&gt;fs;</span><br><span class="line">  expdesc e;</span><br><span class="line">  <span class="keyword">int</span> first, nret;  <span class="comment">/* registers with returned values */</span></span><br><span class="line">  luaX_next(ls);  <span class="comment">/* skip RETURN */</span></span><br><span class="line">  <span class="keyword">if</span> (block_follow(ls-&gt;t.token) || ls-&gt;t.token == <span class="string">';'</span>)</span><br><span class="line">    first = nret = <span class="number">0</span>;  <span class="comment">/* return no values */</span></span><br><span class="line">  <span class="keyword">else</span> &#123;</span><br><span class="line">    nret = explist1(ls, &amp;e);  <span class="comment">/* optional return values */</span></span><br><span class="line">    <span class="keyword">if</span> (hasmultret(e.k)) &#123;</span><br><span class="line">      luaK_setmultret(fs, &amp;e);</span><br><span class="line">      <span class="keyword">if</span> (e.k == VCALL &amp;&amp; nret == <span class="number">1</span>) &#123;  <span class="comment">/* tail call? */</span></span><br><span class="line">        SET_OPCODE(getcode(fs,&amp;e), OP_TAILCALL);</span><br><span class="line">        lua_assert(GETARG_A(getcode(fs,&amp;e)) == fs-&gt;nactvar);</span><br><span class="line">      &#125;</span><br><span class="line">      first = fs-&gt;nactvar;</span><br><span class="line">      nret = LUA_MULTRET;  <span class="comment">/* return all values */</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="keyword">if</span> (nret == <span class="number">1</span>)  <span class="comment">/* only one single value? */</span></span><br><span class="line">        first = luaK_exp2anyreg(fs, &amp;e);</span><br><span class="line">      <span class="keyword">else</span> &#123;</span><br><span class="line">        luaK_exp2nextreg(fs, &amp;e);  <span class="comment">/* values must go to the `stack' */</span></span><br><span class="line">        first = fs-&gt;nactvar;  <span class="comment">/* return all `active' values */</span></span><br><span class="line">        lua_assert(nret == fs-&gt;freereg - first);</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  luaK_ret(fs, first, nret);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">int</span> <span class="title">statement</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">int</span> <span class="built_in">line</span> = ls-&gt;linenumber;  <span class="comment">/* may be needed for error messages */</span></span><br><span class="line">  <span class="keyword">switch</span> (ls-&gt;t.token) &#123;</span><br><span class="line">    <span class="keyword">case</span> TK_IF: &#123;  <span class="comment">/* stat -&gt; ifstat */</span></span><br><span class="line">      ifstat(ls, <span class="built_in">line</span>);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_WHILE: &#123;  <span class="comment">/* stat -&gt; whilestat */</span></span><br><span class="line">      whilestat(ls, <span class="built_in">line</span>);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_DO: &#123;  <span class="comment">/* stat -&gt; DO block END */</span></span><br><span class="line">      luaX_next(ls);  <span class="comment">/* skip DO */</span></span><br><span class="line">      block(ls);</span><br><span class="line">      check_match(ls, TK_END, TK_DO, <span class="built_in">line</span>);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_FOR: &#123;  <span class="comment">/* stat -&gt; forstat */</span></span><br><span class="line">      forstat(ls, <span class="built_in">line</span>);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_REPEAT: &#123;  <span class="comment">/* stat -&gt; repeatstat */</span></span><br><span class="line">      repeatstat(ls, <span class="built_in">line</span>);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_FUNCTION: &#123;</span><br><span class="line">      funcstat(ls, <span class="built_in">line</span>);  <span class="comment">/* stat -&gt; funcstat */</span></span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_LOCAL: &#123;  <span class="comment">/* stat -&gt; localstat */</span></span><br><span class="line">      luaX_next(ls);  <span class="comment">/* skip LOCAL */</span></span><br><span class="line">      <span class="keyword">if</span> (testnext(ls, TK_FUNCTION))  <span class="comment">/* local function? */</span></span><br><span class="line">	  	<span class="comment">/*</span></span><br><span class="line"><span class="comment">	  	** local function funName()</span></span><br><span class="line"><span class="comment">	  	** end</span></span><br><span class="line"><span class="comment">	  	*/</span></span><br><span class="line">        localfunc(ls);	</span><br><span class="line">      <span class="keyword">else</span></span><br><span class="line">        localstat(ls);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_RETURN: &#123;  <span class="comment">/* stat -&gt; retstat */</span></span><br><span class="line">      retstat(ls);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">1</span>;  <span class="comment">/* must be last statement */</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">case</span> TK_BREAK: &#123;  <span class="comment">/* stat -&gt; breakstat */</span></span><br><span class="line">      luaX_next(ls);  <span class="comment">/* skip BREAK */</span></span><br><span class="line">      breakstat(ls);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">1</span>;  <span class="comment">/* must be last statement */</span></span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">default</span>: &#123;</span><br><span class="line">      exprstat(ls);</span><br><span class="line">      <span class="keyword">return</span> <span class="number">0</span>;  <span class="comment">/* to avoid warnings */</span></span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">static</span> <span class="keyword">void</span> <span class="title">chunk</span> <span class="params">(LexState *ls)</span> </span>&#123;</span><br><span class="line">  <span class="comment">/* chunk -&gt; &#123; stat [`;'] &#125; */</span></span><br><span class="line">  <span class="keyword">int</span> islast = <span class="number">0</span>;</span><br><span class="line">  enterlevel(ls);</span><br><span class="line">  <span class="keyword">while</span> (!islast &amp;&amp; !block_follow(ls-&gt;t.token)) &#123;</span><br><span class="line">    islast = statement(ls);</span><br><span class="line">	<span class="comment">/* statement后面的';'是可选的 */</span></span><br><span class="line">    testnext(ls, <span class="string">';'</span>);</span><br><span class="line">    lua_assert(ls-&gt;fs-&gt;f-&gt;maxstacksize &gt;= ls-&gt;fs-&gt;freereg &amp;&amp;</span><br><span class="line">               ls-&gt;fs-&gt;freereg &gt;= ls-&gt;fs-&gt;nactvar);</span><br><span class="line">	</span><br><span class="line">	<span class="comment">/* 释放上一个块占用的临时寄存器 */</span></span><br><span class="line">    ls-&gt;fs-&gt;freereg = ls-&gt;fs-&gt;nactvar;  <span class="comment">/* free registers */</span></span><br><span class="line">  &#125;</span><br><span class="line">  leavelevel(ls);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/* &#125;====================================================================== */</span></span><br></pre></td></tr></table></figure>

  <script>
    // Popup Window;
    var isfetched = false;
    var isXml = true;
    // Search DB path;
    var search_path = "search.xml";
    if (search_path.length === 0) {
      search_path = "search.xml";
    } else if (/json$/i.test(search_path)) {
      isXml = false;
    }
    var path = "/" + search_path;
    // monitor main search box;

    var onPopupClose = function (e) {
      $('.popup').hide();
      $('#local-search-input').val('');
      $('.search-result-list').remove();
      $('#no-result').remove();
      $(".local-search-pop-overlay").remove();
      $('body').css('overflow', '');
    }

    function proceedsearch() {
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay"></div>')
        .css('overflow', 'hidden');
      $('.search-popup-overlay').click(onPopupClose);
      $('.popup').toggle();
      var $localSearchInput = $('#local-search-input');
      $localSearchInput.attr("autocapitalize", "none");
      $localSearchInput.attr("autocorrect", "off");
      $localSearchInput.focus();
    }

    // search function;
    var searchFunc = function(path, search_id, content_id) {
      'use strict';

      // start loading animation
      $("body")
        .append('<div class="search-popup-overlay local-search-pop-overlay">' +
          '<div id="search-loading-icon">' +
          '<i class="fa fa-spinner fa-pulse fa-5x fa-fw"></i>' +
          '</div>' +
          '</div>')
        .css('overflow', 'hidden');
      $("#search-loading-icon").css('margin', '20% auto 0 auto').css('text-align', 'center');

      

      $.ajax({
        url: path,
        dataType: isXml ? "xml" : "json",
        async: true,
        success: function(res) {
          // get the contents from search data
          isfetched = true;
          $('.popup').detach().appendTo('.header-inner');
          var datas = isXml ? $("entry", res).map(function() {
            return {
              title: $("title", this).text(),
              content: $("content",this).text(),
              url: $("url" , this).text()
            };
          }).get() : res;
          var input = document.getElementById(search_id);
          var resultContent = document.getElementById(content_id);
          var inputEventFunction = function() {
            var searchText = input.value.trim().toLowerCase();
            var keywords = searchText.split(/[\s\-]+/);
            if (keywords.length > 1) {
              keywords.push(searchText);
            }
            var resultItems = [];
            if (searchText.length > 0) {
              // perform local searching
              datas.forEach(function(data) {
                var isMatch = false;
                var hitCount = 0;
                var searchTextCount = 0;
                var title = data.title.trim();
                var titleInLowerCase = title.toLowerCase();
                var content = data.content.trim().replace(/<[^>]+>/g,"");
                
                var contentInLowerCase = content.toLowerCase();
                var articleUrl = decodeURIComponent(data.url).replace(/\/{2,}/g, '/');
                var indexOfTitle = [];
                var indexOfContent = [];
                // only match articles with not empty titles
                if(title != '') {
                  keywords.forEach(function(keyword) {
                    function getIndexByWord(word, text, caseSensitive) {
                      var wordLen = word.length;
                      if (wordLen === 0) {
                        return [];
                      }
                      var startPosition = 0, position = [], index = [];
                      if (!caseSensitive) {
                        text = text.toLowerCase();
                        word = word.toLowerCase();
                      }
                      while ((position = text.indexOf(word, startPosition)) > -1) {
                        index.push({position: position, word: word});
                        startPosition = position + wordLen;
                      }
                      return index;
                    }

                    indexOfTitle = indexOfTitle.concat(getIndexByWord(keyword, titleInLowerCase, false));
                    indexOfContent = indexOfContent.concat(getIndexByWord(keyword, contentInLowerCase, false));
                  });
                  if (indexOfTitle.length > 0 || indexOfContent.length > 0) {
                    isMatch = true;
                    hitCount = indexOfTitle.length + indexOfContent.length;
                  }
                }

                // show search results

                if (isMatch) {
                  // sort index by position of keyword

                  [indexOfTitle, indexOfContent].forEach(function (index) {
                    index.sort(function (itemLeft, itemRight) {
                      if (itemRight.position !== itemLeft.position) {
                        return itemRight.position - itemLeft.position;
                      } else {
                        return itemLeft.word.length - itemRight.word.length;
                      }
                    });
                  });

                  // merge hits into slices

                  function mergeIntoSlice(text, start, end, index) {
                    var item = index[index.length - 1];
                    var position = item.position;
                    var word = item.word;
                    var hits = [];
                    var searchTextCountInSlice = 0;
                    while (position + word.length <= end && index.length != 0) {
                      if (word === searchText) {
                        searchTextCountInSlice++;
                      }
                      hits.push({position: position, length: word.length});
                      var wordEnd = position + word.length;

                      // move to next position of hit

                      index.pop();
                      while (index.length != 0) {
                        item = index[index.length - 1];
                        position = item.position;
                        word = item.word;
                        if (wordEnd > position) {
                          index.pop();
                        } else {
                          break;
                        }
                      }
                    }
                    searchTextCount += searchTextCountInSlice;
                    return {
                      hits: hits,
                      start: start,
                      end: end,
                      searchTextCount: searchTextCountInSlice
                    };
                  }

                  var slicesOfTitle = [];
                  if (indexOfTitle.length != 0) {
                    slicesOfTitle.push(mergeIntoSlice(title, 0, title.length, indexOfTitle));
                  }

                  var slicesOfContent = [];
                  while (indexOfContent.length != 0) {
                    var item = indexOfContent[indexOfContent.length - 1];
                    var position = item.position;
                    var word = item.word;
                    // cut out 100 characters
                    var start = position - 20;
                    var end = position + 80;
                    if(start < 0){
                      start = 0;
                    }
                    if (end < position + word.length) {
                      end = position + word.length;
                    }
                    if(end > content.length){
                      end = content.length;
                    }
                    slicesOfContent.push(mergeIntoSlice(content, start, end, indexOfContent));
                  }

                  // sort slices in content by search text's count and hits' count

                  slicesOfContent.sort(function (sliceLeft, sliceRight) {
                    if (sliceLeft.searchTextCount !== sliceRight.searchTextCount) {
                      return sliceRight.searchTextCount - sliceLeft.searchTextCount;
                    } else if (sliceLeft.hits.length !== sliceRight.hits.length) {
                      return sliceRight.hits.length - sliceLeft.hits.length;
                    } else {
                      return sliceLeft.start - sliceRight.start;
                    }
                  });

                  // select top N slices in content

                  var upperBound = parseInt('1');
                  if (upperBound >= 0) {
                    slicesOfContent = slicesOfContent.slice(0, upperBound);
                  }

                  // highlight title and content

                  function highlightKeyword(text, slice) {
                    var result = '';
                    var prevEnd = slice.start;
                    slice.hits.forEach(function (hit) {
                      result += text.substring(prevEnd, hit.position);
                      var end = hit.position + hit.length;
                      result += '<b class="search-keyword">' + text.substring(hit.position, end) + '</b>';
                      prevEnd = end;
                    });
                    result += text.substring(prevEnd, slice.end);
                    return result;
                  }

                  var resultItem = '';

                  if (slicesOfTitle.length != 0) {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + highlightKeyword(title, slicesOfTitle[0]) + "</a>";
                  } else {
                    resultItem += "<li><a href='" + articleUrl + "' class='search-result-title'>" + title + "</a>";
                  }

                  slicesOfContent.forEach(function (slice) {
                    resultItem += "<a href='" + articleUrl + "'>" +
                      "<p class=\"search-result\">" + highlightKeyword(content, slice) +
                      "...</p>" + "</a>";
                  });

                  resultItem += "</li>";
                  resultItems.push({
                    item: resultItem,
                    searchTextCount: searchTextCount,
                    hitCount: hitCount,
                    id: resultItems.length
                  });
                }
              })
            };
            if (keywords.length === 1 && keywords[0] === "") {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-search fa-5x"></i></div>'
            } else if (resultItems.length === 0) {
              resultContent.innerHTML = '<div id="no-result"><i class="fa fa-frown-o fa-5x"></i></div>'
            } else {
              resultItems.sort(function (resultLeft, resultRight) {
                if (resultLeft.searchTextCount !== resultRight.searchTextCount) {
                  return resultRight.searchTextCount - resultLeft.searchTextCount;
                } else if (resultLeft.hitCount !== resultRight.hitCount) {
                  return resultRight.hitCount - resultLeft.hitCount;
                } else {
                  return resultRight.id - resultLeft.id;
                }
              });
              var searchResultList = '<ul class=\"search-result-list\">';
              resultItems.forEach(function (result) {
                searchResultList += result.item;
              })
              searchResultList += "</ul>";
              resultContent.innerHTML = searchResultList;
            }
          }

          if ('auto' === 'auto') {
            input.addEventListener('input', inputEventFunction);
          } else {
            $('.search-icon').click(inputEventFunction);
            input.addEventListener('keypress', function (event) {
              if (event.keyCode === 13) {
                inputEventFunction();
              }
            });
          }

          // remove loading animation
          $(".local-search-pop-overlay").remove();
          $('body').css('overflow', '');

          proceedsearch();
        }
      });
    }

    // handle and trigger popup window;
    $('.popup-trigger').click(function(e) {
      e.stopPropagation();
      if (isfetched === false) {
        searchFunc(path, 'local-search-input', 'local-search-result');
      } else {
        proceedsearch();
      };
    });

    $('.popup-btn-close').click(onPopupClose);
    $('.popup').click(function(e){
      e.stopPropagation();
    });
    $(document).on('keyup', function (event) {
      var shouldDismissSearchPopup = event.which === 27 &&
        $('.search-popup').is(':visible');
      if (shouldDismissSearchPopup) {
        onPopupClose();
      }
    });
  </script>

<script>
  $('.highlight').each(function(i, e) {
    var $wrap = $('<div>').addClass('highlight-wrap');
    $(e).after($wrap);
    $wrap.append($('<button>').addClass('copy-btn').append('复制').on('click', function(e) {
      var code = $(this).parent().find('.code').find('.line').map(function(i, e) {
        return $(e).text();
      }).toArray().join('\n');
      var ta = document.createElement('textarea');
      var yPosition = window.pageYOffset || document.documentElement.scrollTop;
      ta.style.top = yPosition + 'px'; // Prevent page scroll
      ta.style.position = 'absolute';
      ta.style.opacity = '0';
      ta.readOnly = true;
      ta.value = code;
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, code.length);
      ta.readOnly = false;
      var result = document.execCommand('copy');
      
        if (result) $(this).text('复制成功');
        else $(this).text('复制失败');
      
      ta.blur(); // For iOS
      $(this).blur();
    })).on('mouseleave', function(e) {
      var $b = $(this).find('.copy-btn');
      setTimeout(function() {
        $b.text('复制');
      }, 300);
    }).append(e);
  })
</script>
